name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  validate-version:
    name: Validate release version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches manifest metadata
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          tag_version="${TAG_NAME#v}"
          cargo_version="$(awk -F'"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          citation_version="$(awk -F': ' '/^version:/ { print $2; exit }' CITATION.cff)"

          if [ -z "$cargo_version" ] || [ -z "$citation_version" ]; then
            echo "Unable to read version metadata from Cargo.toml or CITATION.cff" >&2
            exit 1
          fi

          if [ "$cargo_version" != "$citation_version" ]; then
            echo "Version mismatch: Cargo.toml=$cargo_version, CITATION.cff=$citation_version" >&2
            exit 1
          fi

          if [ "$tag_version" != "$cargo_version" ]; then
            echo "Tag version $tag_version does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: validate-version
    permissions:
      contents: write

    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
